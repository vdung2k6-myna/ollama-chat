<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Load backend URL from config.json (can be updated after deployment)
        let configLoaded = false;
        
        async function initBackendUrl() {
            try {
                const configResponse = await fetch('./config.json');
                if (!configResponse.ok) throw new Error('config.json not found');
                
                const config = await configResponse.json();
                if (config.backendUrl) {
                    window.BACKEND_URL = config.backendUrl;
                    console.log('BACKEND_URL loaded from config.json:', window.BACKEND_URL);
                } else {
                    throw new Error('backendUrl not in config.json');
                }
            } catch (err) {
                console.warn('Failed to load config.json, using default:', err);
                window.BACKEND_URL = 'http://localhost:5000';
            } finally {
                configLoaded = true;
            }
        }
        
        // Load config before anything else
        initBackendUrl();
    </script>
</head>
<body>
    <div id="auth-container">
        <div id="login-form">
            <h2>Login</h2>
            <div id="login-errors"></div>
            <button id="github-login-btn" class="oauth-btn">Login with GitHub</button>
            <div style="margin: 20px 0; text-align: center; color: #666;">--- or ---</div>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button id="login-btn">Login</button>
            <button id="signup-btn">Sign Up</button>
            <p id="auth-status"></p>
        </div>
    </div>
    
    <div id="chat-container" style="display: none;">
        <div id="user-pane"></div>
        <div id="splitter"></div>
        <div id="bot-pane-container">
            <div id="bot-pane"></div>
        </div>
    </div>
    <div id="settings-pane">
        <div id="settings-content">
            <h3>Ollama Model</h3>
            <select id="model-select"></select>
            <h3>System Message</h3>
            <textarea id="system-message" placeholder="Enter system message to guide the AI behavior (e.g., 'You are a helpful coding assistant')..."></textarea>
        </div>
    </div>
    <button id="settings-toggle"><</button>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message...">
        <button id="send-button">Send</button>
        <button id="clear-button">Clear</button>
        <button id="logout-btn" style="display: none;">Logout</button>
    </div>
</body>
</html>
